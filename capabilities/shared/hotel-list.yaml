naftiko: "1.0.0-alpha1"

info:
  label: Amadeus Hotel List API
  description: Shared capability definition for the Amadeus Hotel List API providing hotel identifiers, names, addresses, and geocoordinates.
  tags:
    - Amadeus
    - Hotels
    - Listings
    - Travel
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AMADEUS_API_KEY: AMADEUS_API_KEY
      AMADEUS_API_SECRET: AMADEUS_API_SECRET

capability:
  consumes:
    - type: http
      namespace: hotel-list
      baseUri: https://test.api.amadeus.com/v1
      description: Amadeus Hotel List API for property discovery and identifiers.
      authentication:
        type: bearer
        token: "{{AMADEUS_BEARER_TOKEN}}"
      resources:
        - name: hotels-by-hotel-ids
          path: /reference-data/locations/hotels/by-hotels
          description: Search hotels by their Amadeus property codes.
          operations:
            - name: get-hotels-by-hotel-ids
              method: GET
              description: Returns hotel data for given hotel IDs.
              inputParameters:
                - name: hotelIds
                  in: query
                  type: array
                  required: true
                  description: Amadeus property codes (8 characters).
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: hotels-by-city
          path: /reference-data/locations/hotels/by-city
          description: Search hotels by IATA city code.
          operations:
            - name: get-hotels-by-city
              method: GET
              description: Returns hotels in a given city.
              inputParameters:
                - name: cityCode
                  in: query
                  type: string
                  required: true
                  description: IATA city code (e.g., LON, PAR, NYC).
                - name: radius
                  in: query
                  type: integer
                  required: false
                  description: Search radius in kilometers.
                - name: radiusUnit
                  in: query
                  type: string
                  required: false
                  description: Unit for radius (KM or MILE).
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: hotels-by-geocode
          path: /reference-data/locations/hotels/by-geocode
          description: Search hotels by geographic coordinates.
          operations:
            - name: get-hotels-by-geocode
              method: GET
              description: Returns hotels near given geographic coordinates.
              inputParameters:
                - name: latitude
                  in: query
                  type: number
                  required: true
                  description: Latitude in decimal degrees.
                - name: longitude
                  in: query
                  type: number
                  required: true
                  description: Longitude in decimal degrees.
                - name: radius
                  in: query
                  type: integer
                  required: false
                  description: Search radius in kilometers.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: hotel-list-api
      resources:
        - path: /v1/hotels
          name: hotels
          description: Hotel listing and search endpoint.
          operations:
            - method: GET
              name: get-hotels-by-hotel-ids
              description: Get hotels by property IDs.
              call: "hotel-list.get-hotels-by-hotel-ids"
              with:
                hotelIds: "rest.hotelIds"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: hotel-list-mcp
      transport: http
      tools:
        - name: get-hotels-by-hotel-ids
          description: Retrieve hotel data for specific Amadeus property codes.
          hints:
            readOnly: true
            openWorld: true
          call: "hotel-list.get-hotels-by-hotel-ids"
          with:
            hotelIds: "tools.hotelIds"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-hotels-by-city
          description: Find hotels in a city using IATA city code.
          hints:
            readOnly: true
            openWorld: true
          call: "hotel-list.get-hotels-by-city"
          with:
            cityCode: "tools.cityCode"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-hotels-by-geocode
          description: Find hotels near geographic coordinates.
          hints:
            readOnly: true
            openWorld: true
          call: "hotel-list.get-hotels-by-geocode"
          with:
            latitude: "tools.latitude"
            longitude: "tools.longitude"
          outputParameters:
            - type: object
              mapping: "$."
