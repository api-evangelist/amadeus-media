naftiko: "1.0.0-alpha1"

info:
  label: Amadeus Hotel Content API
  description: Shared capability definition for the Amadeus Hotel Content API providing detailed hotel property information including descriptions, amenities, and media assets.
  tags:
    - Amadeus
    - Hotels
    - Content
    - Media
    - Travel
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AMADEUS_API_KEY: AMADEUS_API_KEY
      AMADEUS_API_SECRET: AMADEUS_API_SECRET

capability:
  consumes:
    - type: http
      namespace: hotel-content
      baseUri: https://api.amadeus.com/v1
      description: Amadeus Hotel Content API providing rich property data and media.
      authentication:
        type: bearer
        token: "{{AMADEUS_BEARER_TOKEN}}"
      resources:
        - name: hotel-content
          path: /reference-data/locations/hotels/by-hotels/content
          description: Hotel property content including descriptions, amenities, and contact.
          operations:
            - name: get-hotel-content
              method: GET
              description: Returns detailed content for one or more hotels.
              inputParameters:
                - name: hotelIds
                  in: query
                  type: array
                  required: true
                  description: Amadeus property codes (8 characters) up to 20.
                - name: language
                  in: query
                  type: string
                  required: false
                  description: Language code for content (e.g., EN, FR, DE).
                - name: fields
                  in: query
                  type: string
                  required: false
                  description: Comma-separated content fields to include.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: hotel-media
          path: /reference-data/locations/hotels/by-hotels/media
          description: Hotel media assets including images and videos.
          operations:
            - name: get-hotel-media
              method: GET
              description: Returns media assets for one or more hotels.
              inputParameters:
                - name: hotelIds
                  in: query
                  type: array
                  required: true
                  description: Amadeus property codes up to 20.
                - name: category
                  in: query
                  type: string
                  required: false
                  description: Filter by media category (EXTERIOR, LOBBY, ROOM, etc.).
                - name: format
                  in: query
                  type: string
                  required: false
                  description: Preferred image format (JPEG, PNG, WEBP).
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: hotel-content-api
      resources:
        - path: /v1/hotels/content
          name: hotel-content
          description: Hotel property content endpoint.
          operations:
            - method: GET
              name: get-hotel-content
              description: Get detailed hotel property content.
              call: "hotel-content.get-hotel-content"
              with:
                hotelIds: "rest.hotelIds"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/hotels/media
          name: hotel-media
          description: Hotel media assets endpoint.
          operations:
            - method: GET
              name: get-hotel-media
              description: Get hotel media assets.
              call: "hotel-content.get-hotel-media"
              with:
                hotelIds: "rest.hotelIds"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: hotel-content-mcp
      transport: http
      tools:
        - name: get-hotel-content
          description: Retrieve detailed hotel property content including descriptions, amenities, and contact information.
          hints:
            readOnly: true
            openWorld: true
          call: "hotel-content.get-hotel-content"
          with:
            hotelIds: "tools.hotelIds"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-hotel-media
          description: Retrieve hotel media assets including photos of exterior, lobby, rooms, and amenities.
          hints:
            readOnly: true
            openWorld: true
          call: "hotel-content.get-hotel-media"
          with:
            hotelIds: "tools.hotelIds"
          outputParameters:
            - type: object
              mapping: "$."
