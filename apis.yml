  - aid: amadeus-media:hotel-list-api
    name: Hotel List API
    description: >-
      The Amadeus Hotel List API returns hotel property data including name,
      address, geographic coordinates, and time zone for each hotel bookable
      through Amadeus. This API is the starting point for building hotel search
      experiences and retrieving the property identifiers needed to fetch hotel
      media and offers.
    humanURL: https://developers.amadeus.com/self-service/category/hotels/api-doc/hotel-list
