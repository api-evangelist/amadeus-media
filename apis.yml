  - type: Features
    data:
      - name: Hotel Property Images
        description: >-
          Access high-quality images and multimedia assets for hotel properties
          through the Enterprise Hotel Content API and trusted content partners
          like Leonardo.
      - name: Rich Property Descriptions
        description: >-
          Retrieve detailed hotel descriptions, amenity lists, facility
          information, and property attributes for comprehensive hotel profiles.
      - name: Geolocation Data
        description: >-
          Access geographic coordinates, addresses, and time zones for over
          770,000 hotels in the Amadeus global inventory.
      - name: Enterprise Content Access
        description: >-
          Enterprise API tier provides access to detailed hotel content
          including media that is not available in self-service APIs due to
          licensing constraints.
      - name: Multi-Language Support
        description: >-
          Hotel content and descriptions available in multiple languages to
          support international travel applications and global markets.
  - type: UseCases
    data:
      - name: Online Travel Agency Hotel Listings
        description: >-
          Power hotel search pages with rich property photos, descriptions, and
          amenity information sourced directly from Amadeus content services.
      - name: Metasearch Platform Integration
        description: >-
          Integrate Amadeus hotel content into metasearch engines to display
          property images and descriptions alongside rate comparisons.
      - name: Hotel Booking Engine Content
        description: >-
          Enhance hotel booking flows with compelling property imagery and
          detailed descriptions to improve conversion rates.
      - name: Travel App Media Display
        description: >-
          Display hotel photos and media in mobile travel apps to give users
          visual context when browsing and booking accommodation.
      - name: Corporate Travel Platform
        description: >-
          Provide hotel content and imagery in corporate travel management
          systems to help business travelers make informed accommodation
          decisions.
  - type: Integrations
    data:
      - name: Leonardo (Hotel Images)
        description: >-
          Amadeus recommends Leonardo as the trusted data provider for hotel
          images and property media, offering a comprehensive library of hotel
          photography.
      - name: Google Places API
        description: >-
          Developers can supplement Amadeus hotel data with Google Places API
          to retrieve hotel images and business information for properties in
          the Amadeus inventory.
      - name: Amadeus Hotel Search API
        description: >-
          Combine with Amadeus Hotel Search to display media alongside hotel
          offers and pricing for a complete shopping experience.
      - name: Amadeus Hotel Booking API
        description: >-
          Integrate hotel content with the booking flow to present property
          images and descriptions before and during the reservation process.
      - name: Amadeus Hotel Ratings API
        description: >-
          Pair hotel media with sentiment-based ratings to create compelling
          hotel profile pages that combine visual content with review insights.
