image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
description: >-
  Amadeus Media provides APIs and data services for accessing travel-related
  media content, including hotel images, property descriptions, multimedia
  assets, and rich content for hospitality and travel applications. Amadeus
  partners with trusted content providers such as Leonardo to deliver
  high-quality hotel media through enterprise-grade APIs used by online travel
  agencies, metasearch platforms, and hospitality technology providers.
created: '2024-01-01'
