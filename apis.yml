apis:
  - aid: amadeus-media:hotel-content-api
    name: Hotel Content API
    description: >-
      The Amadeus Hotel Content API provides detailed property information
      including descriptions, amenities, facilities, contact details, and media
      assets such as images and multimedia content for hotels in the Amadeus
      inventory. Available through Amadeus Enterprise APIs, this API enables
      travel platforms to display rich hotel profiles with photos, room images,
      and property descriptions.
    humanURL: https://developers.amadeus.com/enterprise/category/hotel/api/content
    baseURL: https://api.amadeus.com
    tags:
